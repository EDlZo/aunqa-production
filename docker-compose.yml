version: '3.8'

# Production Docker Swarm stack
# Deploy ด้วย: docker stack deploy -c docker-compose.yml aunqa-esar

services:
  frontend:
    image: ${CI_REGISTRY_FRONTEND_IMAGE:-registry.rmutsv.app/wrf/aunqa-esar/frontend}:latest
    environment:
      - TZ=${TZ:-Asia/Bangkok}
    networks:
      - public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.labels.node-cpu == true]
      labels:
        traefik.enable: 'true'
        traefik.http.routers.aunqa_frontend.entrypoints: websecure
        traefik.http.routers.aunqa_frontend.rule: Host(`${FRONTEND_HOST:-aunqa.wrf.rmutsv.app}`)
        traefik.http.routers.aunqa_frontend.tls.certresolver: coe-swarm
        traefik.http.services.aunqa_frontend.loadbalancer.server.port: '80'
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  backend:
    image: ${CI_REGISTRY_BACKEND_IMAGE:-registry.rmutsv.app/wrf/aunqa-esar/backend}:latest
    environment:
      - TZ=${TZ:-Asia/Bangkok}
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-aunqa-files}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - CORS_ORIGIN=${CORS_ORIGIN}
    networks:
      - public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.labels.node-cpu == true]
      labels:
        traefik.enable: 'true'
        traefik.http.routers.aunqa_backend.entrypoints: websecure
        traefik.http.routers.aunqa_backend.rule: Host(`${BACKEND_HOST:-aunqa-api.wrf.rmutsv.app}`)
        traefik.http.routers.aunqa_backend.tls.certresolver: coe-swarm
        traefik.http.services.aunqa_backend.loadbalancer.server.port: '5000'
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  public:
    external: true
